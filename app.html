<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Eleven Academy - Login</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    body{font-family:'Inter',sans-serif;background:#F8F7F4;display:flex;align-items:center;justify-content:center;min-height:100vh}
    .login-container{background:white;border-radius:16px;box-shadow:0 8px 32px rgba(0,0,0,.15);padding:48px;width:100%;max-width:420px}
    .logo{text-align:center;margin-bottom:32px}
    .logo h1{font-size:24px;font-weight:700;color:#1a1a1a}
    .logo .dot{color:#C9A84C}
    .logo p{color:#6B6965;font-size:13px;margin-top:8px}
    .form-group{margin-bottom:20px}
    label{display:block;font-size:12px;font-weight:600;color:#6B6965;margin-bottom:8px;text-transform:uppercase;letter-spacing:.5px}
    input{width:100%;padding:12px;border:1px solid #E8E6E0;border-radius:8px;font-size:14px;font-family:inherit;transition:border .2s}
    input:focus{outline:none;border-color:#C9A84C}
    .btn-login{width:100%;padding:14px;background:#C9A84C;color:white;border:none;border-radius:8px;font-size:14px;font-weight:600;cursor:pointer;transition:background .2s;margin-top:8px}
    .btn-login:hover{background:#b8943f}
    .error{color:#e74c3c;font-size:12px;margin-top:8px;display:none}
    .success{color:#27ae60;font-size:12px;margin-top:8px;display:none}
    .loading{display:none;text-align:center;color:#6B6965;font-size:12px}
  </style>
</head>
<body>

<div class="login-container">
  <div class="logo">
    <h1>ELEVEN ACADEMY<span class="dot">.</span></h1>
    <p>App de Captación de Clientes</p>
  </div>

  <form id="loginForm">
    <div class="form-group">
      <label>Email</label>
      <input type="email" id="email" placeholder="comunicacion@elevenacademy.pro" required>
    </div>

    <div class="form-group">
      <label>Contraseña</label>
      <input type="password" id="password" placeholder="••••••••" required>
    </div>

    <div id="error" class="error"></div>
    <div id="success" class="success"></div>
    <div id="loading" class="loading">Cargando...</div>

    <button type="submit" class="btn-login">Acceder</button>
  </form>
</div>

<script>
const VALID_EMAIL = 'comunicacion@elevenacademy.pro';
const VALID_PASSWORD = 'Eleven2026';

document.getElementById('loginForm').addEventListener('submit', function(e) {
  e.preventDefault();

  const email = document.getElementById('email').value.trim();
  const password = document.getElementById('password').value;
  const errorDiv = document.getElementById('error');
  const successDiv = document.getElementById('success');
  const loadingDiv = document.getElementById('loading');

  errorDiv.style.display = 'none';
  successDiv.style.display = 'none';
  loadingDiv.style.display = 'block';

  // Simular validación (en producción sería contra un servidor)
  setTimeout(() => {
    if (email === VALID_EMAIL && password === VALID_PASSWORD) {
      // Guardar sesión
      localStorage.setItem('eleven_user', email);
      localStorage.setItem('eleven_session', Date.now());

      successDiv.textContent = '✓ Acceso correcto. Redirigiendo...';
      successDiv.style.display = 'block';
      loadingDiv.style.display = 'none';

      setTimeout(() => {
        window.location.href = './index.html';
      }, 1500);
    } else {
      errorDiv.textContent = '✗ Email o contraseña incorrectos';
      errorDiv.style.display = 'block';
      loadingDiv.style.display = 'none';
    }
  }, 800);
});

// Verificar si ya está logueado
window.addEventListener('load', function() {
  if (localStorage.getItem('eleven_user')) {
    window.location.href = './index.html';
  }
});
</script>

</body>
</html>
